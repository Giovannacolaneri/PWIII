services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: aluno123

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"  # MUDAMOS AQUI! Acesso via IP-DA-VM:8080
    environment:
      - PMA_ARBITRARY=1

  web:
    image: nginx
    ports:
       - "80:80"   # O seu site fica na porta padrão (IP-DA-VM)
    volumes:
       - ./meufrontend:/usr/share/nginx/html


